<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/nav::head('Маршруты', 'routes')}"></head>
<body>
<div th:replace="~{fragments/nav::nav('routes')}"></div>

<div class="container py-3">
  <div class="page-header d-flex justify-content-between align-items-center">
    <div>
      <h3 class="mb-0"><i class="bi bi-map text-secondary"></i> Маршруты</h3>
      <p class="text-muted mb-0" th:text="${#lists.size(routes)} + ' маршрутов'"></p>
    </div>
  </div>

  <div class="search-bar mb-3">
    <i class="bi bi-search search-icon"></i>
    <input type="text" class="form-control" id="routeSearch" placeholder="Поиск по названию..." oninput="filterRoutes(this.value)">
  </div>

  <div th:if="${!#lists.isEmpty(routes)}">
    <div class="row g-2" id="routeList">
      <div class="col-12 col-md-6 col-lg-4" th:each="r : ${routes}" th:attr="data-search=${r.title}">
        <div class="water-card h-100">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h6 class="card-title mb-0" th:text="${r.title}"></h6>
              <a th:href="@{/routes/{id}(id=${r.id})}" class="btn btn-sm btn-outline-primary rounded-pill touch-btn flex-shrink-0 ms-2"><i class="bi bi-arrow-right"></i></a>
            </div>
            <div class="card-text mb-2 small" th:text="${r.description} ?: '...'"></div>
            <div>
              <span class="badge bg-info bg-opacity-10 text-info me-1" th:text="${r.difficulty}"></span>
              <span class="badge bg-secondary bg-opacity-10 text-secondary"><i class="bi bi-signpost-2"></i> <span th:text="${r.distanceKm}"></span> км</span>
              <span th:if="${r.estimatedDurationMin}" class="badge bg-secondary bg-opacity-10 text-secondary ms-1"><i class="bi bi-clock"></i> <span th:text="${r.estimatedDurationMin}"></span> мин</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="empty-state" th:if="${#lists.isEmpty(routes)}">
    <i class="bi bi-map"></i>
    <p class="mb-0">Нет маршрутов</p>
  </div>
</div>

<div th:replace="~{fragments/nav::bottomNav('routes')}"></div>
<script>
function filterRoutes(val) {
  const q = val.toLowerCase().trim();
  document.querySelectorAll('#routeList .col-12').forEach(el => {
    el.style.display = (!q || el.dataset.search.toLowerCase().includes(q)) ? '' : 'none';
  });
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
