<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/nav::head('Инклюзия', 'inclusive')}"></head>
<body>
<div th:replace="~{fragments/nav::nav('inclusive')}"></div>

<div class="container py-3">
  <div class="page-header">
    <h3 class="mb-0"><i class="bi bi-universal-access text-primary"></i> Инклюзия</h3>
    <p class="text-muted">Адаптивные программы, ограничения здоровья, сопровождение</p>
  </div>

  <div class="search-bar mb-3">
    <i class="bi bi-search search-icon"></i>
    <input type="text" class="form-control" id="incSearch" placeholder="Поиск по пользователю..." oninput="filterInc(this.value)">
  </div>

  <div th:if="${!#lists.isEmpty(profiles)}">
    <div class="row g-2" id="incList">
      <div class="col-12 col-md-6" th:each="p : ${profiles}" th:attr="data-search=${p.userId}">
        <div class="water-card h-100">
          <div class="card-body">
            <div class="d-flex align-items-center mb-2">
              <div class="rounded-circle bg-primary bg-opacity-10 p-2 me-2">
                <i class="bi bi-person text-primary"></i>
              </div>
              <h6 class="card-title mb-0" th:text="${p.userId}"></h6>
            </div>
            <div class="card-text small">
              <div class="mb-1"><span class="text-muted">Ограничения:</span> <span th:text="${p.healthRestrictions} ?: 'нет данных'"></span></div>
              <div class="mb-1"><span class="text-muted">Нагрузка:</span> <span class="badge bg-light text-dark" th:text="${p.allowedLoadLevel} ?: 'не указан'"></span></div>
              <div class="mb-1"><span class="text-muted">Потребности:</span> <span th:text="${p.accessibilityNeeds} ?: 'не указаны'"></span></div>
              <div><span class="text-muted">Сопровождающий:</span> <span th:text="${p.supportPersonId} ?: 'не назначен'"></span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="empty-state" th:if="${#lists.isEmpty(profiles)}">
    <i class="bi bi-universal-access"></i>
    <p class="mb-0">Нет инклюзивных профилей</p>
  </div>
</div>

<div th:replace="~{fragments/nav::bottomNav('inclusive')}"></div>
<script>
function filterInc(val) {
  const q = val.toLowerCase().trim();
  document.querySelectorAll('#incList .col-12').forEach(el => {
    el.style.display = (!q || el.dataset.search.toLowerCase().includes(q)) ? '' : 'none';
  });
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
