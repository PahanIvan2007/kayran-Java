<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/nav::head('Аренда', 'rentals')}"></head>
<body>
<div th:replace="~{fragments/nav::nav('rentals')}"></div>

<div class="container py-3">
  <div class="page-header d-flex justify-content-between align-items-center">
    <div>
      <h3 class="mb-0"><i class="bi bi-journal text-warning"></i> Аренда</h3>
      <p class="text-muted mb-0" th:text="${#lists.size(rentals)} + ' записей'"></p>
    </div>
  </div>

  <div class="water-card">
    <div th:if="${!#lists.isEmpty(rentals)}">
      <div class="item-row" th:each="r : ${rentals}">
        <div class="item-main">
          <div class="item-title small">
            <span class="text-muted" th:text="${r.id}"></span>
            <span class="mx-1">·</span>
            <span th:text="${r.boatId}"></span>
            <span class="mx-1">→</span>
            <span th:text="${r.userId}"></span>
          </div>
          <div class="item-meta">
            <span th:if="${r.startTime}" th:text="${#temporals.format(r.startTime, 'dd.MM HH:mm')}"></span>
            <span th:if="${r.endTime}" th:text="' — ' + ${#temporals.format(r.endTime, 'dd.MM HH:mm')}"></span>
            <span th:if="${r.eventId}" class="ms-2 badge bg-light text-dark"><i class="bi bi-calendar"></i> <span th:text="${r.eventId}"></span></span>
          </div>
        </div>
        <div class="item-action">
          <span class="badge badge-status" th:classappend="${r.status.name() == 'active' ? 'bg-success' : r.status.name() == 'completed' ? 'bg-secondary' : 'bg-danger'}" th:text="${r.status}"></span>
        </div>
      </div>
    </div>
    <div class="empty-state" th:if="${#lists.isEmpty(rentals)}">
      <i class="bi bi-journal"></i>
      <p class="mb-0">Нет записей аренды</p>
    </div>
  </div>
</div>

<div th:replace="~{fragments/nav::bottomNav('rentals')}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
