<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="nav(activePage)" class="navbar navbar-expand-lg navbar-dark water-nav">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-droplet-half"></i> Water</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-label="Меню">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'dashboard' ? 'active' : ''}" href="/"><i class="bi bi-speedometer2"></i>Дашборд</a></li>
        <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'events' ? 'active' : ''}" href="/events"><i class="bi bi-calendar-event"></i>События</a></li>
        <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'users' ? 'active' : ''}" href="/users"><i class="bi bi-people"></i>Люди</a></li>
        <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'boats' ? 'active' : ''}" href="/boats"><i class="bi bi-boat"></i>Лодки</a></li>
        <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'routes' ? 'active' : ''}" href="/routes"><i class="bi bi-map"></i>Маршруты</a></li>
        <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'tournaments' ? 'active' : ''}" href="/tournaments"><i class="bi bi-trophy"></i>Спорт</a></li>
        <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'inclusive' ? 'active' : ''}" href="/inclusive"><i class="bi bi-universal-access"></i>Инклюзия</a></li>
        <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'rentals' ? 'active' : ''}" href="/rentals"><i class="bi bi-journal"></i>Аренда</a></li>
        <li class="nav-item dropdown ms-lg-2">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle"></i> <span th:text="${#authentication.name}"></span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><span class="dropdown-item-text small text-muted" sec:authorize="isAuthenticated()">
              Роль: <span th:text="${#authentication.authorities.iterator().next().toString().replace('ROLE_','')}"></span>
            </span></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="/auth/logout"><i class="bi bi-box-arrow-right"></i> Выйти</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<nav th:fragment="bottomNav(activePage)" class="mobile-bottom-nav">
  <a th:classappend="${activePage == 'dashboard' ? 'active' : ''}" href="/"><i class="bi bi-speedometer2"></i>Главная</a>
  <a th:classappend="${activePage == 'events' ? 'active' : ''}" href="/events"><i class="bi bi-calendar-event"></i>События</a>
  <a th:classappend="${activePage == 'boats' ? 'active' : ''}" href="/boats"><i class="bi bi-boat"></i>Лодки</a>
  <a th:classappend="${activePage == 'routes' ? 'active' : ''}" href="/routes"><i class="bi bi-map"></i>Маршруты</a>
  <a th:classappend="${activePage == 'tournaments' ? 'active' : ''}" href="/tournaments"><i class="bi bi-trophy"></i>Спорт</a>
  <a th:classappend="${activePage == 'inclusive' ? 'active' : ''}" href="/inclusive"><i class="bi bi-universal-access"></i>Инклюз</a>
  <a th:classappend="${activePage == 'rentals' ? 'active' : ''}" href="/rentals"><i class="bi bi-journal"></i>Аренда</a>
</nav>

<div th:fragment="head(title, activePage)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title th:text="${title} + ' — Water'"></title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/water.css}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path fill='%230077b6' d='M8 16a6 6 0 0 0 6-6c0-4-6-10-6-10S2 6 2 10a6 6 0 0 0 6 6z'/></svg>">
</div>
</body>
</html>
