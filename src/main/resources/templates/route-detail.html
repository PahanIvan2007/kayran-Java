<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/nav::head(${route.title}, 'routes')}"></head>
<body>
<div th:replace="~{fragments/nav::nav('routes')}"></div>

<div class="container py-3">
  <a href="/routes" class="btn btn-sm btn-outline-secondary rounded-pill mb-3 touch-btn"><i class="bi bi-arrow-left"></i> Назад</a>

  <div class="water-card mb-3">
    <div class="card-header bg-transparent border-bottom">
      <h4 class="mb-0 fw-bold" th:text="${route.title}"></h4>
    </div>
    <div class="card-body">
      <div class="row g-3 mb-3">
        <div class="col-6 col-md-3">
          <div class="text-center p-2 bg-light rounded-3">
            <div class="text-muted small">Сложность</div>
            <span class="badge bg-info bg-opacity-10 text-info mt-1 fs-6" th:text="${route.difficulty}"></span>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="text-center p-2 bg-light rounded-3">
            <div class="text-muted small">Дистанция</div>
            <div class="fw-semibold mt-1"><span th:text="${route.distanceKm}"></span> км</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="text-center p-2 bg-light rounded-3">
            <div class="text-muted small">Длительность</div>
            <div class="fw-semibold mt-1" th:text="${route.estimatedDurationMin ?: '-'}"></div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="text-center p-2 bg-light rounded-3">
            <div class="text-muted small">Тип</div>
            <div class="fw-semibold mt-1" th:text="${route.routeType ?: '-'}"></div>
          </div>
        </div>
      </div>
      <div th:if="${route.description}">
        <hr>
        <p class="card-text" th:text="${route.description}"></p>
      </div>
    </div>
  </div>

  <h5 class="fw-semibold mb-2"><i class="bi bi-geo-alt text-primary"></i> Точки маршрута <span class="badge bg-primary rounded-pill align-middle" th:text="${#lists.size(points)}"></span></h5>

  <div th:if="${!#lists.isEmpty(points)}" class="water-card">
    <div class="item-row" th:each="p : ${points}">
      <div class="item-main">
        <div class="item-title"><span class="badge bg-primary bg-opacity-10 text-primary me-2" th:text="${p.orderIndex}"></span><span th:text="${p.title}"></span></div>
        <div class="item-meta">
          <span th:text="${p.lat}"></span>, <span th:text="${p.lng}"></span>
          <span th:if="${p.checkpointType}" class="ms-2"><span class="badge bg-light text-dark" th:text="${p.checkpointType}"></span></span>
        </div>
      </div>
    </div>
  </div>
  <div class="empty-state" th:if="${#lists.isEmpty(points)}">
    <i class="bi bi-geo-alt"></i>
    <p class="mb-0">Нет точек маршрута</p>
  </div>

  <div class="mt-3">
    <a th:href="@{/api/qr/route/{id}(id=${route.id})}" class="btn btn-outline-success rounded-pill touch-btn" target="_blank"><i class="bi bi-qr-code"></i> QR-код маршрута</a>
  </div>
</div>

<div th:replace="~{fragments/nav::bottomNav('routes')}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
