<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/nav::head('Лодки', 'boats')}"></head>
<body>
<div th:replace="~{fragments/nav::nav('boats')}"></div>

<div class="container py-3">
  <div class="page-header d-flex justify-content-between align-items-center">
    <div>
      <h3 class="mb-0"><i class="bi bi-boat text-info"></i> Лодки</h3>
      <p class="text-muted mb-0" th:text="${#lists.size(boats)} + ' единиц'"></p>
    </div>
  </div>

  <div class="search-bar mb-3">
    <i class="bi bi-search search-icon"></i>
    <input type="text" class="form-control" id="boatSearch" placeholder="Поиск по номеру, типу..." oninput="filterBoats(this.value)">
  </div>

  <div th:if="${!#lists.isEmpty(boats)}">
    <div class="row g-2" id="boatList">
      <div class="col-12 col-md-6 col-lg-4" th:each="b : ${boats}" th:attr="data-search=${b.serialNumber + ' ' + b.boatType}">
        <div class="water-card h-100">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h6 class="card-title mb-0" th:text="${b.serialNumber}"></h6>
              <span class="badge badge-status" th:classappend="${b.status.name() == 'available' ? 'bg-success' : b.status.name() == 'rented' ? 'bg-warning' : 'bg-secondary'}" th:text="${b.status}"></span>
            </div>
            <div class="card-text">
              <span class="badge bg-light text-dark me-1"><i class="bi bi-tag"></i> <span th:text="${b.boatType}"></span></span>
              <span class="badge bg-light text-dark me-1"><i class="bi bi-people"></i> <span th:text="${b.capacity}"></span></span>
              <span th:if="${b.pointId}" class="badge bg-light text-dark"><i class="bi bi-geo-alt"></i> <span th:text="${b.pointId}"></span></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="empty-state" th:if="${#lists.isEmpty(boats)}">
    <i class="bi bi-boat"></i>
    <p class="mb-0">Нет лодок</p>
  </div>
</div>

<div th:replace="~{fragments/nav::bottomNav('boats')}"></div>
<script>
function filterBoats(val) {
  const q = val.toLowerCase().trim();
  document.querySelectorAll('#boatList .col-12').forEach(el => {
    el.style.display = (!q || el.dataset.search.toLowerCase().includes(q)) ? '' : 'none';
  });
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
