<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/nav::head('Дашборд', 'dashboard')}">
</head>
<body>
<div th:replace="~{fragments/nav::nav('dashboard')}"></div>

<div class="container py-3">
  <div class="page-header">
    <h2 class="mb-0"><i class="bi bi-speedometer2 text-primary"></i> Дашборд</h2>
    <p class="text-muted">Платформа водных активностей и инклюзивного спорта</p>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-4 col-md-3">
      <div class="card water-stat-card border-top border-4 border-primary">
        <div class="card-body text-center">
          <a href="/users" class="stretched-link"></a>
          <div class="stat-icon text-primary"><i class="bi bi-people"></i></div>
          <h3 class="text-primary" th:text="${userCount}">0</h3>
          <p class="text-muted">Люди</p>
        </div>
      </div>
    </div>
    <div class="col-4 col-md-3">
      <div class="card water-stat-card border-top border-4 border-success">
        <div class="card-body text-center">
          <a href="/events" class="stretched-link"></a>
          <div class="stat-icon text-success"><i class="bi bi-calendar-event"></i></div>
          <h3 class="text-success" th:text="${eventCount}">0</h3>
          <p class="text-muted">События</p>
        </div>
      </div>
    </div>
    <div class="col-4 col-md-3">
      <div class="card water-stat-card border-top border-4 border-info">
        <div class="card-body text-center">
          <a href="/boats" class="stretched-link"></a>
          <div class="stat-icon text-info"><i class="bi bi-boat"></i></div>
          <h3 class="text-info" th:text="${boatCount}">0</h3>
          <p class="text-muted">Лодки</p>
        </div>
      </div>
    </div>
    <div class="col-4 col-md-3">
      <div class="card water-stat-card border-top border-4 border-secondary">
        <div class="card-body text-center">
          <a href="/routes" class="stretched-link"></a>
          <div class="stat-icon text-secondary"><i class="bi bi-map"></i></div>
          <h3 class="text-secondary" th:text="${routeCount}">0</h3>
          <p class="text-muted">Маршруты</p>
        </div>
      </div>
    </div>
    <div class="col-4 col-md-3">
      <div class="card water-stat-card border-top border-4 border-warning">
        <div class="card-body text-center">
          <a href="/rentals" class="stretched-link"></a>
          <div class="stat-icon text-warning"><i class="bi bi-journal"></i></div>
          <h3 class="text-warning" th:text="${rentalCount}">0</h3>
          <p class="text-muted">Аренды</p>
        </div>
      </div>
    </div>
    <div class="col-4 col-md-3">
      <div class="card water-stat-card border-top border-4 border-danger">
        <div class="card-body text-center">
          <a href="/tournaments" class="stretched-link"></a>
          <div class="stat-icon text-danger"><i class="bi bi-trophy"></i></div>
          <h3 class="text-danger" th:text="${tournamentCount}">0</h3>
          <p class="text-muted">Турниры</p>
        </div>
      </div>
    </div>
    <div class="col-4 col-md-3">
      <div class="card water-stat-card border-top border-4 border-primary">
        <div class="card-body text-center">
          <a href="/inclusive" class="stretched-link"></a>
          <div class="stat-icon text-primary"><i class="bi bi-universal-access"></i></div>
          <h3 class="text-primary" th:text="${inclusiveCount}">0</h3>
          <p class="text-muted">Инклюзия</p>
        </div>
      </div>
    </div>
  </div>

  <div class="water-card">
    <div class="card-header bg-transparent d-flex justify-content-between align-items-center border-bottom">
      <span class="fw-semibold"><i class="bi bi-calendar-event text-primary me-1"></i>Последние события</span>
      <a href="/events" class="btn btn-sm btn-primary rounded-pill touch-btn">Все <i class="bi bi-chevron-right"></i></a>
    </div>
    <div class="list-card" th:if="${!#lists.isEmpty(events)}">
      <div class="item-row" th:each="e : ${events}">
        <a th:href="@{/events/{id}(id=${e.id})}" class="stretched-link"></a>
        <div class="item-main">
          <div class="item-title" th:text="${e.title}"></div>
          <div class="item-meta">
            <span class="badge bg-secondary bg-opacity-10 text-secondary me-2" th:text="${e.eventType}"></span>
            <span th:if="${e.startTime != null}" th:text="${#temporals.format(e.startTime, 'dd.MM.yyyy HH:mm')}"></span>
          </div>
        </div>
        <div class="item-action">
          <span class="badge badge-status" th:classappend="${e.status.name() == 'active' ? 'bg-success' : e.status.name() == 'planned' ? 'bg-primary' : e.status.name() == 'completed' ? 'bg-secondary' : 'bg-danger'}" th:text="${e.status}"></span>
        </div>
      </div>
    </div>
    <div class="empty-state" th:if="${#lists.isEmpty(events)}">
      <i class="bi bi-calendar-event"></i>
      <p class="mb-0">Нет событий</p>
    </div>
  </div>
</div>

<div th:replace="~{fragments/nav::bottomNav('dashboard')}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
