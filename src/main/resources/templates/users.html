<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/nav::head('Люди', 'users')}"></head>
<body>
<div th:replace="~{fragments/nav::nav('users')}"></div>

<div class="container py-3">
  <div class="page-header d-flex justify-content-between align-items-center">
    <div>
      <h3 class="mb-0"><i class="bi bi-people text-primary"></i> Люди</h3>
      <p class="text-muted mb-0" th:text="${#lists.size(users)} + ' человек'"></p>
    </div>
  </div>

  <div class="search-bar mb-3">
    <i class="bi bi-search search-icon"></i>
    <input type="text" class="form-control" id="userSearch" placeholder="Поиск по имени, телефону или email..." oninput="filterUsers(this.value)">
  </div>

  <div class="water-card" th:if="${!#lists.isEmpty(users)}">
    <div id="userList">
      <div class="item-row" th:each="u : ${users}" th:attr="data-search=${u.firstName + ' ' + u.lastName + ' ' + u.phone + ' ' + u.email}">
        <div class="item-main">
          <div class="item-title" th:text="${u.firstName + ' ' + u.lastName}"></div>
          <div class="item-meta">
            <span th:if="${u.phone}" th:text="${u.phone}" class="me-2"></span>
            <span th:if="${u.email}" th:text="${u.email}"></span>
          </div>
        </div>
        <div class="item-action d-flex gap-1 align-items-center">
          <span class="badge bg-info bg-opacity-10 text-info me-1" th:text="${u.role}"></span>
          <span class="badge badge-status" th:classappend="${u.status.name() == 'active' ? 'bg-success' : 'bg-secondary'}" th:text="${u.status}"></span>
        </div>
      </div>
    </div>
  </div>
  <div class="empty-state" th:if="${#lists.isEmpty(users)}">
    <i class="bi bi-people"></i>
    <p class="mb-0">Нет пользователей</p>
  </div>
</div>

<div th:replace="~{fragments/nav::bottomNav('users')}"></div>
<script>
function filterUsers(val) {
  const q = val.toLowerCase().trim();
  document.querySelectorAll('#userList .item-row').forEach(el => {
    el.style.display = (!q || el.dataset.search.toLowerCase().includes(q)) ? '' : 'none';
  });
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
